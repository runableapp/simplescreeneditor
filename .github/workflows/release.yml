name: release

on:
  push:
    tags:
      - "v*"
      - "!vt*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    if: startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'vt')
    env:
      GOPROXY: direct
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            goos: linux
            goarch: amd64
            ext: ""
            use_cgo: "1"
          - os: windows-latest
            platform: windows
            goos: windows
            goarch: amd64
            ext: ".exe"
            use_cgo: "0"
          - os: macos-latest
            platform: mac
            goos: darwin
            goarch: arm64
            ext: ""
            use_cgo: "1"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux GUI build dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build frontend assets
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build
            cd ..
          fi

          if [ ! -d frontend/dist ]; then
            mkdir -p frontend/dist
          fi
          if [ -f docs/simpel_screen_editor_logo.webp ]; then
            cp docs/simpel_screen_editor_logo.webp frontend/dist/simpel_screen_editor_logo.webp
          fi
          if [ -f build/appicon.png ]; then
            cp build/appicon.png frontend/dist/appicon.png
          fi
          if [ ! -f frontend/dist/index.html ]; then
            echo "Missing frontend/dist/index.html. Commit frontend/dist/index.html for release builds." >&2
            exit 1
          fi

      - name: Build executable
        shell: bash
        run: |
          mkdir -p frontend/dist
          if [ -f docs/simpel_screen_editor_logo.webp ]; then
            cp docs/simpel_screen_editor_logo.webp frontend/dist/simpel_screen_editor_logo.webp
          fi
          if [ -f build/appicon.png ]; then
            cp build/appicon.png frontend/dist/appicon.png
          fi
          if [ ! -f frontend/dist/index.html ]; then
            echo "Missing frontend/dist/index.html. Commit frontend/dist/index.html for release builds." >&2
            exit 1
          fi

          mkdir -p "dist/${{ matrix.platform }}"
          output="dist/${{ matrix.platform }}/simpleeditor${{ matrix.ext }}"
          tags="production"
          if [ "${{ matrix.goos }}" = "linux" ]; then
            tags="production webkit2_41"
          fi
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=${{ matrix.use_cgo }} \
              CGO_LDFLAGS="-framework UniformTypeIdentifiers" \
              go build -trimpath -tags "$tags" -ldflags "-s -w" -o "$output" .
          else
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=${{ matrix.use_cgo }} \
              go build -trimpath -tags "$tags" -ldflags "-s -w" -o "$output" .
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist/${{ matrix.platform }}
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'vt')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create platform zip archives
        run: |
          chmod +x release-artifacts/linux/simpleeditor || true
          chmod +x release-artifacts/mac/simpleeditor || true
          for platform in linux windows mac; do
            (cd release-artifacts && zip -r "../simpleeditor-${platform}.zip" "${platform}")
          done

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            simpleeditor-linux.zip
            simpleeditor-windows.zip
            simpleeditor-mac.zip
          generate_release_notes: true
